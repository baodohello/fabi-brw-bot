# GitHub Actions Cron settings
name: Run FABI BRW Bank Sync Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 23 * * *'    # Chạy lúc 6:00 AM giờ Việt Nam
    - cron: '30 1 * * *'    # Chạy lúc 8:30 AM giờ Việt Nam
    - cron: '30 4 * * *'    # Chạy lúc 11:30 AM giờ Việt Nam
    - cron: '30 6 * * *'    # Chạy lúc 1:30 PM giờ Việt Nam
    - cron: '17 13 * * *'    # Chạy lúc 4:30 PM giờ Việt Nam

  workflow_dispatch: # Bấm nút chạy thử bằng tay trên giao diện web GitHub

jobs:
  run-fabi-bot:
    # 🍏 CHUYỂN SANG CHẠY TRÊN MÁY ẢO MACOS
    runs-on: macos-latest 

    steps:
    # Bước 1: Kéo code từ kho lưu trữ GitHub vào máy ảo Mac
    - name: Checkout repository code
      uses: actions/checkout@v4

    # Bước 2: Cài đặt môi trường Python 3.11 (macOS hỗ trợ cực tốt, có sẵn pip chuẩn)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    # Bước 3: Cài đặt các thư viện cần thiết từ file requirements.txt
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install playwright requests python-dotenv; fi

    # Bước 4: Tải trình duyệt Chromium thuần túy (Trên Mac lệnh này chạy phát ăn ngay, không lo lỗi thư viện)
    - name: Install Playwright Chromium Browser
      run: |
        python -m playwright install chromium

    # Bước 5: Kích hoạt chạy con bot mã nguồn của anh
    - name: Execute Bank Switcher Task
      env:
        FABI_USERNAME: ${{ secrets.FABI_USERNAME }}
        FABI_PASSWORD: ${{ secrets.FABI_PASSWORD }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        STORES_CONFIG_JSON: ${{ vars.STORES_CONFIG_JSON }}
      run: python -m tasks.bank_switcher
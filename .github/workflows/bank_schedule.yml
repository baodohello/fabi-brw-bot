# GitHub Actions Cron settings
name: Run FABI BRW Bank Sync Bot

on:
  schedule:
    - cron: '0 23 * * *'    # Chạy lúc 6:00 AM giờ Việt Nam
    - cron: '30 1 * * *'    # Chạy lúc 8:30 AM giờ Việt Nam
    - cron: '30 4 * * *'    # Chạy lúc 11:30 AM giờ Việt Nam
    - cron: '30 6 * * *'    # Chạy lúc 1:30 PM giờ Việt Nam
    - cron: '30 9 * * *'    # Chạy lúc 4:30 PM giờ Việt Nam

  workflow_dispatch: # Giúp có nút "Run workflow" trên giao diện GitHub để bấm chạy thử bằng tay bất cứ lúc nào

jobs:
  run-fabi-bot:
    runs-on: ubuntu-latest 
    
    # 🐳 CHẠY TRÊN MÔI TRƯỜNG DOCKER CHÍNH THỨC CỦA PLAYWRIGHT
    # Môi trường này đã cài sẵn mọi thư viện âm thanh, đồ họa và Chromium chuẩn hóa từ gốc
    container:
      image: mcr.microsoft.com/playwright:v1.44.0-jammy

    steps:
    # Bước 1: Kéo toàn bộ code từ kho lưu trữ GitHub của anh vào môi trường Docker
    - name: Checkout repository code
      uses: actions/checkout@v4

    # Bước 2: Cài đặt các thư viện Python cần thiết
    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install playwright requests python-dotenv; fi

    # Bước 3: Kích hoạt chạy con bot mã nguồn của anh luôn (Bỏ hoàn toàn bước cài đặt browsers bị lỗi)
    - name: Execute Bank Switcher Task
      env:
        FABI_USERNAME: '${{ secrets.FABI_USERNAME }}'
        FABI_PASSWORD: '${{ secrets.FABI_PASSWORD }}'
        DISCORD_WEBHOOK_URL: '${{ secrets.DISCORD_WEBHOOK_URL }}'
      # Chạy script Python theo dạng Module từ thư mục gốc
      run: python3 -m tasks.bank_switcher